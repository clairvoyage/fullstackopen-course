<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>My form page</title>
        <style>
            body {
                text-align: center;
            }

            form {
                display: inline-block;
                padding: 1em;
                border: 1ppp slid #cccccc;
                border-radius: 1em;
            }

            /* styles any p after the first p */
            p + p {
                margin-top: 1em;
            }

            label {
                display: inline-block;
                min-width: 90px;
                text-align: right;
            }

            input,

            textarea {
            /* To make sure that all text fields have the same font settings
                By default, text areas have a monospace font */
            font: 1em sans-serif;
            /* Uniform text field size */
            width: 300px;
            box-sizing: border-box;
            /* Match form field borders */
            border: 1px solid #999999;
            }

            input:focus,
            textarea:focus {
            /* Set the outline width and style */
            outline-style: solid;
            /* To give a little highlight on active elements */
            outline-color: black;
            }

            textarea {
            /* Align multiline text fields with their labels */
            vertical-align: top;
            /* Provide space to type some text */
            height: 5em;
            }

            .button {
            /* Align buttons with the text fields */
            padding-left: 90px; /* same size as the label elements */
            }

            button {
            /* This extra margin represent roughly the same space as the space
                between the labels and their text fields */
            margin-left: 0.5em;
            }

        </style>
    <body>
        <form action="/my-handling-form-page" method="post">
            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="user_name" value="Name"/>
            </p>
            <p>
                <label for="mail">Email:</label>
                <input type="email" id="mail" name="user_email" />
            </p>
            <p>
                <label for="msg">Message:</label>
                <textarea name="msg" id="user_message">By default this area is filled with text</textarea>
            </p>
            <pc class="button">
                <button type="submit">Send your message</button>
            </p>
        </form>
    </body>
</html>
